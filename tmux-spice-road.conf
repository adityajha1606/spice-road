# Spice Road — tmux status bar.
# Complements the Starship prompt rather than duplicating it: this handles
# session/window chrome plus a light ambient strip (git branch of the
# current pane, system load, battery, clock). Language/runtime info stays
# in Starship, inside each pane, where it's actually relevant.
#
# Reuses the same battery.sh and load-average logic already built and
# tested for Starship (PLAN.md §5/§14) rather than duplicating that logic —
# one cache, one source of truth, used from both places.

# ---------- true color ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------- basics ----------
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g status-interval 5
setw -g mode-keys vi

# Prefix stays C-b (tmux default) — deliberately not remapped to C-a, which
# collides with readline's "beginning of line" binding in the shell below
# it. Swap it yourself if you'd rather:
#   unbind C-b ; set -g prefix C-a ; bind C-a send-prefix

# ---------- pane borders ----------
set -g pane-border-style "fg=#8C6239"
set -g pane-active-border-style "fg=#E8A33D"

# ---------- copy-mode / message styling ----------
set -g mode-style "bg=#4A3423,fg=#F2E6D8"
set -g message-style "bg=#8C6239,fg=#F2E6D8"
set -g message-command-style "bg=#8C6239,fg=#F2E6D8"

# ---------- status bar ----------
set -g status-style "bg=#14100D,fg=#C9B79C"
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#[bg=#8C6239,fg=#F2E6D8,bold] \u25c8 #S #[bg=#14100D,fg=#8C6239]\u25b6"

setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#C9B79C"
setw -g window-status-current-format "#[bg=#E8A33D,fg=#14100D,bold] #I:#W #[bg=#14100D,fg=#E8A33D]\u25c0"
setw -g window-status-current-style "bold"
setw -g window-status-activity-style "fg=#E8623A"

set -g status-right "#[fg=#7B3F61]#(cd #{pane_current_path} 2>/dev/null && git branch --show-current 2>/dev/null | sed 's/^/\u2442 /') #[fg=#D4AF37]\u25c6 #(uptime | awk -F'load average: ' '{print $2}' | awk -F',' '{print $1}' | xargs) #[fg=#F2C14E]#(bash ~/.config/starship-helpers/battery.sh 2>/dev/null) #[fg=#C9B79C]%H:%M "